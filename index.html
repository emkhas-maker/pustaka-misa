<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perpustakaan Digital — MI Sultan Agung</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: #fff; border-bottom: 1px solid #e8e8e0; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-brand { display: flex; align-items: center; gap: 10px; }
  .topbar-logo { width: 36px; height: 36px; background: #1D9E75; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 14px; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
  .topbar-sub { font-size: 11px; color: #888; }

  /* SEARCH & FILTER */
  .search-section { background: #fff; border-bottom: 1px solid #e8e8e0; padding: 10px 16px; }
  .search-input { width: 100%; height: 38px; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px 0 36px; font-size: 14px; background: #f9f9f6; color: #1a1a1a; outline: none; }
  .search-input:focus { border-color: #1D9E75; background: #fff; }
  .search-wrap { position: relative; margin-bottom: 10px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 16px; pointer-events: none; }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .pill { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; font-size: 12px; white-space: nowrap; cursor: pointer; background: #fff; color: #555; transition: all .15s; }
  .pill.active { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .pill:hover:not(.active) { border-color: #1D9E75; color: #1D9E75; }

  /* STATS */
  .stats-row { display: flex; gap: 8px; padding: 12px 16px; }
  .stat { flex: 1; background: #fff; border-radius: 8px; padding: 10px; text-align: center; border: 1px solid #e8e8e0; }
  .stat-num { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .stat-lbl { font-size: 11px; color: #888; margin-top: 2px; }

  /* GRID */
  .section-label { font-size: 12px; font-weight: 600; color: #888; padding: 4px 16px 8px; text-transform: uppercase; letter-spacing: .05em; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 0 16px 16px; }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }

  .card { background: #fff; border: 1px solid #e8e8e0; border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color .15s, transform .1s; }
  .card:hover { border-color: #1D9E75; transform: translateY(-2px); }
  .card-cover { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .card-body { padding: 10px; }
  .card-title { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-author { font-size: 11px; color: #888; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: flex-end; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; }
  @media (min-width: 600px) {
    .modal-overlay { align-items: center; justify-content: center; }
    .modal { border-radius: 16px; max-width: 480px; max-height: 80vh; }
  }
  .modal-cover { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 52px; }
  .modal-body { padding: 16px; }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .modal-author { font-size: 13px; color: #888; margin-bottom: 10px; }
  .modal-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .modal-sinopsis { font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 16px; }
  .modal-sinopsis.empty { color: #aaa; font-style: italic; }
  .btn-baca { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px; background: #1D9E75; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; border: none; cursor: pointer; margin-bottom: 8px; text-decoration: none; }
  .btn-baca:hover { background: #17875f; }
  .btn-tutup { display: flex; align-items: center; justify-content: center; width: 100%; padding: 10px; background: #f5f5f0; border-radius: 8px; color: #555; font-size: 14px; border: 1px solid #ddd; cursor: pointer; }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 10px auto 4px; }

  /* LOADING & EMPTY */
  .loading { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 48px 16px; color: #888; font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 3px solid #e8e8e0; border-top-color: #1D9E75; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 48px 16px; color: #aaa; font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">MI</div>
    <div>
      <div class="topbar-title">Perpustakaan Digital</div>
      <div class="topbar-sub">MI Sultan Agung Yogyakarta</div>
    </div>
  </div>
</div>

<!-- SEARCH & FILTER -->
<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Cari judul, pengarang, topik..." oninput="renderKoleksi()">
  </div>
  <div class="filter-row" id="filterRow"></div>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Koleksi</div></div>
  <div class="stat"><div class="stat-num" id="statKategori">—</div><div class="stat-lbl">Kategori</div></div>
  <div class="stat"><div class="stat-num" id="statKelas">—</div><div class="stat-lbl">Kelas</div></div>
</div>

<!-- KOLEKSI -->
<div id="mainContent">
  <div class="loading"><div class="spinner"></div>Memuat koleksi...</div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-handle"></div>
    <div class="modal-cover" id="modalCover"></div>
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-author" id="modalAuthor"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-sinopsis" id="modalSinopsis"></div>
      <a class="btn-baca" id="btnBaca" target="_blank">📖 Baca sekarang</a>
      <button class="btn-tutup" onclick="tutupModal()">Tutup</button>
    </div>
  </div>
</div>

<script>
  // ── GANTI URL INI dengan URL deployment Apps Script kamu ──
  const API_URL = 'https://script.google.com/macros/s/AKfycbyixVTMoyuFGCWKudeLF1tRaVkmUxuNEd1M9xgkTZxfsLnrz9LALArwyYzqS23WAlPQKg/exec';

  const KATEGORI_CONFIG = {
    'Buku teks':   { warna: '#E6F1FB', teks: '#185FA5', ikon: '📘' },
    'Buku bacaan': { warna: '#E1F5EE', teks: '#0F6E56', ikon: '📗' },
    'Karya siswa': { warna: '#EEEDFE', teks: '#534AB7', ikon: '✏️' },
    'Karya Guru':  { warna: '#FAEEDA', teks: '#854F0B', ikon: '📝' },
    'Dokumen':     { warna: '#F1EFE8', teks: '#5F5E5A', ikon: '📄' },
  };

  function getConfig(kategori) {
    return KATEGORI_CONFIG[kategori] || { warna: '#F1EFE8', teks: '#5F5E5A', ikon: '📚' };
  }

  let semuaData = [];
  let filterAktif = 'Semua';

  async function loadData() {
  try {
    const data = await fetchJSONP(API_URL + '?action=list&callback=cb');
    semuaData = data.data || [];
    buildStats();
    buildFilter();
    renderKoleksi();
  } catch (err) {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty"><div class="empty-icon">⚠️</div>Gagal memuat data.<br>Periksa URL API.</div>';
  }
}

function fetchJSONP(url) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    window.cb = (data) => {
      resolve(data);
      document.body.removeChild(script);
    };
    script.src = url;
    script.onerror = reject;
    document.body.appendChild(script);
  });
}

  function buildStats() {
    const kategoriSet = new Set(semuaData.map(d => d.kategori));
    const kelasSet = new Set(semuaData.map(d => d.kelas));
    document.getElementById('statTotal').textContent = semuaData.length;
    document.getElementById('statKategori').textContent = kategoriSet.size;
    document.getElementById('statKelas').textContent = kelasSet.size;
  }

  function buildFilter() {
    const kategoriList = ['Semua', ...new Set(semuaData.map(d => d.kategori))];
    const row = document.getElementById('filterRow');
    row.innerHTML = kategoriList.map(k =>
      `<div class="pill ${k === filterAktif ? 'active' : ''}" onclick="setFilter('${k}')">${k}</div>`
    ).join('');
  }

  function setFilter(k) {
    filterAktif = k;
    buildFilter();
    renderKoleksi();
  }

  function renderKoleksi() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let data = semuaData;

    if (filterAktif !== 'Semua') {
      data = data.filter(d => d.kategori === filterAktif);
    }
    if (q) {
      data = data.filter(d =>
        d.judul.toLowerCase().includes(q) ||
        (d.sinopsis || '').toLowerCase().includes(q) ||
        (d.pengarang || '').toLowerCase().includes(q)
      );
    }

    if (data.length === 0) {
      document.getElementById('mainContent').innerHTML =
        '<div class="empty"><div class="empty-icon">📭</div>Tidak ada koleksi ditemukan.</div>';
      return;
    }

    // Kelompokkan per kategori
    const perKategori = {};
    data.forEach(d => {
      if (!perKategori[d.kategori]) perKategori[d.kategori] = [];
      perKategori[d.kategori].push(d);
    });

    let html = '';
    Object.entries(perKategori).forEach(([kat, items]) => {
      html += `<div class="section-label">${kat} <span style="font-weight:400">(${items.length})</span></div>`;
      html += '<div class="grid">';
      items.forEach(buku => {
        const cfg = getConfig(buku.kategori);
        html += `
          <div class="card" onclick="bukaModal(${JSON.stringify(buku).replace(/"/g, '&quot;')})">
            <div class="card-cover" style="background:${cfg.warna}">${cfg.ikon}</div>
            <div class="card-body">
              <div class="card-title">${buku.judul}</div>
              <div class="card-author">${buku.pengarang || '—'}</div>
              <span class="badge" style="background:${cfg.warna};color:${cfg.teks}">${buku.kategori}</span>
            </div>
          </div>`;
      });
      html += '</div>';
    });

    document.getElementById('mainContent').innerHTML = html;
  }

  function bukaModal(buku) {
    const cfg = getConfig(buku.kategori);
    document.getElementById('modalCover').style.background = cfg.warna;
    document.getElementById('modalCover').textContent = cfg.ikon;
    document.getElementById('modalTitle').textContent = buku.judul;
    document.getElementById('modalAuthor').textContent =
      (buku.pengarang || '—') + (buku.tahun ? ' · ' + buku.tahun : '');

    const meta = [
      buku.kategori && `<span class="badge" style="background:${cfg.warna};color:${cfg.teks}">${buku.kategori}</span>`,
      buku.kelas && `<span class="badge" style="background:#F1EFE8;color:#5F5E5A">Kelas ${buku.kelas}</span>`,
      buku.mapel && buku.mapel !== '-' && `<span class="badge" style="background:#F1EFE8;color:#5F5E5A">${buku.mapel}</span>`,
    ].filter(Boolean).join('');
    document.getElementById('modalMeta').innerHTML = meta;

    const sinopsis = buku.sinopsis && buku.sinopsis.trim();
    const el = document.getElementById('modalSinopsis');
    if (sinopsis) {
      el.textContent = sinopsis;
      el.classList.remove('empty');
    } else {
      el.textContent = 'Sinopsis belum tersedia.';
      el.classList.add('empty');
    }

    const driveId = (buku.drive_id || '').replace(/\?.*$/, '').trim();
    const btnBaca = document.getElementById('btnBaca');
    if (driveId && driveId !== '-') {
      btnBaca.href = `https://drive.google.com/file/d/${driveId}/preview`;
      btnBaca.style.opacity = '1';
      btnBaca.style.pointerEvents = 'auto';
    } else {
      btnBaca.href = '#';
      btnBaca.style.opacity = '.4';
      btnBaca.style.pointerEvents = 'none';
    }

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function tutupModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) tutupModal();
  }

  loadData();
</script>
</body>
</html>
